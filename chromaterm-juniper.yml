# ChromaTerm highlight rules for JunOS
# Translated from https://github.com/lkowolowski/junos.vim/blob/master/syntax/junos.vim
#
# Vim group -> CT color mapping:
#   junosLabel      (Identifier)   -> f#e5c07b  yellow/gold
#   junosKeyword    (Statement)    -> f#c678dd  purple
#   junosCond       (Type)         -> f#56b6c2  cyan
#   junosProtocol   (Type)         -> f#56b6c2  cyan
#   junosAction     (Error)        -> f#e06c75  red
#   junosFunction   (Function)     -> f#61afef  blue
#   junosConfigure  (Function)     -> f#61afef  blue
#   junosDef        (String)       -> f#98c379  green
#   junosInterface  (Underlined)   -> f#98c379  green  + underline
#   junosIpv4       (Underlined)   -> f#98c379  green  + underline
#   junosComment    (Comment)      -> f#5c6370  grey   + italic
#   junosString     (String)       -> f#98c379  green
#   junosVar        (String)       -> f#98c379  green

palette:
  purple: "#c678dd"
  cyan: "#56b6c2"
  red: "#e06c75"
  blue: "#61afef"
  green: "#98c379"
  gold: "#e5c07b"
  grey: "#5c6370"

rules:
  # ── junosComment (grey italic) ─────────────────────────────────────────────
  - description: JunOS description line
    regex: description.*$
    color: f.grey italic

  - description: JunOS inline comment (#)
    regex: \s*#.*$
    color: f.grey italic

  # ── junosString (green) ────────────────────────────────────────────────────
  - description: JunOS quoted string
    regex: '"[^"]*"'
    color: f.green

  # ── junosVar (green) ───────────────────────────────────────────────────────
  - description: JunOS numeric value
    regex: \b\d+\b
    color: f.green

  - description: JunOS low/high keywords
    regex: \b(low|high)\b
    color: f.green

  # ── junosIpv4 (green underline) ────────────────────────────────────────────
  - description: JunOS IPv4 address (with optional prefix length)
    regex: \b(25[0-5]|2[0-4]\d|[01]?\d{1,2})(\.(25[0-5]|2[0-4]\d|[01]?\d{1,2})){3}(/[0-9]{1,2})?\b
    color: f.green underline

  # ── junosInterface (green underline) ───────────────────────────────────────
  - description: JunOS physical interfaces (et/xe/ge/vcp/gr)
    regex: \b(et|xe|ge|vcp|gr)-\d+/\d+/\d+(\.\d+)?
    color: f.green underline

  - description: JunOS logical interfaces (ae/reth/fab/lo)
    regex: \b(ae|reth|fab|lo)\d+(\.\d+)?
    color: f.green underline

  - description: JunOS IRB and st0 interfaces
    regex: \b(st0|irb)(\.\d+)?
    color: f.green underline

  - description: JunOS virtual-chassis and vlan interface keywords
    regex: \b(virtual-chassis|vlan)\b
    color: f.green underline

  - description: JunOS vme interface
    regex: \bvme\b
    color: f.green underline

  # ── junosLabel (gold) ──────────────────────────────────────────────────────
  - description: JunOS top-level stanza labels
    regex: \b(system|chassis|firewall|security|rule|rule-set|pool)\b
    color: f.gold

  # ── junosKeyword (purple) ──────────────────────────────────────────────────
  - description: JunOS configuration keywords
    regex: \b(version|server|class|user|address|route|nat|policy|vlan-id|mtu|filter|term|routing-instances|routing-engine|line-card|next-hop|cluster|vrrp-group|security-zone|encapsulation|storm-control|alg|log|login|node|zone|path|community)\b
    color: f.purple

  - description: JunOS interfaces keyword
    regex: \binterfaces?\b
    color: f.purple

  - description: JunOS vlans keyword
    regex: \bvlans?\b
    color: f.purple

  - description: JunOS members keyword
    regex: \bmembers?\b
    color: f.purple

  - description: JunOS applications keyword
    regex: \bapplications?\b
    color: f.purple

  # ── junosCond (cyan) ───────────────────────────────────────────────────────
  - description: JunOS conditional / zone keywords
    regex: \b(if|else|for-each|to-zone|from-zone|match|then|from|to)\b
    color: f.cyan

  # ── junosProtocol (cyan) ───────────────────────────────────────────────────
  - description: JunOS L3/L4 protocols
    regex: \b(ip|ipv6|inet|inet6|tcp|udp)\b
    color: f.cyan

  - description: JunOS management and service protocols
    regex: \b(snmp|snmptrap|ntp|syslog|ssh|ftp|ftp-data|dns|sql)\b
    color: f.cyan

  - description: JunOS routing protocols
    regex: \b(ospf|ospf3|rip|ripng|isis)\b
    color: f.cyan

  - description: JunOS layer-2 / multicast protocols
    regex: \b(igmp|igmp-snooping|lldp|lldp-med|mld|mld-snooping|msdp|mstp|mvrp|mpls|vpls|vrrp|lacp|stp|sflow|vstp|dot1x|msrp|msrpc|sunrpc|icmp|ping|pim|rstp|rsvp|netconf)\b
    color: f.cyan

  - description: JunOS BGP (eBGP/iBGP)
    regex: \b[ie]?bgp\b
    color: f.cyan

  - description: JunOS HTTP/HTTPS
    regex: \bhttps?\b
    color: f.cyan

  - description: JunOS 802.3ad / 802.1Q
    regex: \b802\.(3ad|1Q)\b
    color: f.cyan

  - description: JunOS built-in junos- application names
    regex: \bjunos-[-a-z]+
    color: f.cyan

  # ── junosAction (red) ──────────────────────────────────────────────────────
  - description: JunOS policy actions
    regex: \b(any|deny|permit|accept|reject|discard|disable|enable)\b
    color: f.red

  # ── junosConfigure (blue) ──────────────────────────────────────────────────
  - description: JunOS operational / configure mode verbs
    regex: \b(set|delete|rename|insert|request|show)\b
    color: f.blue

  - description: JunOS interface/port mode keywords
    regex: \b(trunk|access|static|track|standby|full-duplex|automatic|auto-negotiation|input|output|prefer|active|passive|link-mode|port-mode|speed|queue)\b
    color: f.blue

  - description: JunOS speed shorthand (e.g. 1g, 100m)
    regex: \b\d+[gm]\b
    color: f.blue

  # ── junosFunction (blue) ───────────────────────────────────────────────────
  - description: JunOS functional / structural keywords
    regex: \b(redundancy-group|screen|policies|flow|zones|vrf|virtual-router|id|host|host-name|priority|weight|port|protocol|source-address|destination-address|source-port|destination-port|import|export|source|destination|primary|secondary|neighbor)\b
    color: f.blue

  - description: JunOS groups keyword
    regex: \bgroups?\b
    color: f.blue

  - description: JunOS protocols keyword
    regex: \bprotocols?\b
    color: f.blue

  - description: JunOS unit stanza (e.g. "unit 0")
    regex: \bunit\s+\d+
    color: f.blue

  - description: JunOS vlan sub-interface (e.g. vlan.100)
    regex: \bvlan\.\d+
    color: f.blue

  - description: JunOS node reference (e.g. node0, node1)
    regex: \bnode\d+
    color: f.blue

  # ── junosDef – leading uppercase word (green) ──────────────────────────────
  - description: JunOS definition token (leading uppercase identifier)
    regex: (?<=\s)[A-Z]\S+
    color: f.green
